# Imports themes
imports:
  - ~/.config/alacritty/colors/one-dark.yml

# General
window:
  opacity: 0.99
  # Dimensiones de la ventana
  padding:
    x: 10
    y: 10
  decorations: none

# Apariencia
# colors:
  # Paleta de colores
  # primary:
  #   background: '0x1d2021'
  #   foreground: '0xc5c8c6'

  # Colores de las selecciones
  # selection:
  #   text: '0x1d2021'
  #   background: '0x689d6a'

font:
  # Fuente
  normal:
    family: 'NotoMono Nerd Font'
    style: Regular
  bold:
    family: 'NotoMono Nerd Font'
    style: Bold
  italic:
    family: 'NotoMono Nerd Font'
    style: Italic
  bold_italic:
    family: 'NotoMono Nerd Font'
    style: Bold Italic

# Atajos de teclado personalizados
key_bindings:
  - { key: V, mods: Control, action: Paste }
  - { key: C, mods: Control, action: Copy }
  - { key: F11, action: ToggleFullscreen }

# Opciones de renderizado
render:
  # Habilitar el renderizado ligero
  # para mejorar el rendimiento
  use_thin_strokes: true

# Opciones de desplazamiento
scrolling:
  # Habilitar el desplazamiento suave
  # durante el desplazamiento del mouse
  smooth:
    time: 100
    frames: 3

# Tema de pestañas
tabs:
  # Estilo de pestañas
  style: Box

  # Opciones de diseño de pestañas
  tab:
    # Fondo de pestañas inactivas
    inactive:
      background: '#282c34'
      # Texto de pestañas inactivas
      #foreground: '#abb2bf'
    # Fondo de la pestaña actual
    active:
      background: '#61afef'
      # Texto de la pestaña actual
      #foreground: '#ffffff'

# Ajustes del cursor
cursor:
  # Forma del cursor
  style: Block
  # Colores del cursor
  vi_mode_cursor:
    normal: '#61afef'
    insert: '#98c379'
    replace: '#e06c75'
    visual: '#c678dd'
    select: '#e5c07b'
    motion: '#56b6c2'
    overwrite: '#56b6c2'

# Configuración de desplazamiento de página completa
search:
  # Habilitar resaltado de búsqueda incremental
  incremental: true

  # Estilo de resaltado de búsqueda
  style: Reverse

# Configuración de notificaciones
notify:
  # Ubicación de la ventana emergente de notificación
  position:
    x: Center
    y: Top

  # Duración de la notificación en milisegundos
  duration: 3000

# Configuración de atajos de teclado
key_mapping:
  # Cambiar el atajo para abrir el menú
  open_menu: V
